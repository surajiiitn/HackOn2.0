<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
              "safe-green": "#10b981",
              "caution-amber": "#f59e0b",
            },
            fontFamily: {
              "display": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>body {
    font-family: "Public Sans", sans-serif
    }
.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCm9vJ8fBaIfYooSWTzSLh3ksyp1g_0M7_K44vLei42Ry2uIvCgLZDYwir5AKO6DxOiw7H7P50XieY44CQk2_e0ttRmI4_FC1VRvNJkcS3836OwrxwNOyS4adgatdElBISS5uZtUifZ-8Ke6MLiuckzPhGUjwIb6RAtp6EtnFD596XDsOPRr-5UXZdMHfufUCdirEXahQtLLM0QB2y5u-w8e-I0wbCf3MW-mj_I7d5eY7VSmzjoL1Z8AmwTFJhG5fOHpXrZ5DTODsrY);
    background-size: cover;
    background-position: center
    }
.custom-shadow {
    box-shadow: 0 -4px 20px -5px rgba(0, 0, 0, 0.5)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden h-screen w-full">
<!-- Main Map Container -->
<div class="relative h-full w-full map-bg" data-alt="Dark themed street map with emerald green and amber route lines" data-location="San Francisco Downtown" style="">
<!-- SVG Route Overlay (Simulated) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<!-- Safe Route (Emerald Green) -->
<path d="M100 200 L150 250 L150 400 L250 450" fill="none" stroke="#10b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<!-- Cautious Route (Amber) -->
<path d="M100 200 L50 300 L80 450 L250 450" fill="none" stroke="#f59e0b" stroke-dasharray="8 4" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<!-- Markers -->
<circle cx="100" cy="200" fill="#ec5b13" r="8"></circle>
<circle cx="250" cy="450" fill="#10b981" r="8" stroke="white" stroke-width="2"></circle>
</svg>
<!-- Top Search Interface -->
<div class="absolute top-0 left-0 w-full p-4 pt-12 bg-gradient-to-b from-background-dark/80 to-transparent">
<div class="max-w-md mx-auto space-y-2">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary text-sm">my_location</span>
</div>
<input class="w-full bg-background-dark/90 border-none rounded-xl py-3 pl-10 pr-4 text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary shadow-lg" placeholder="Current Location" type="text" value="123 Harmony St."/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-safe-green text-sm">location_on</span>
</div>
<input class="w-full bg-background-dark/90 border-none rounded-xl py-3 pl-10 pr-4 text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary shadow-lg" placeholder="Where to?" type="text" value="Central Park West"/>
</div>
</div>
</div>
<!-- Floating Action Buttons -->
<div class="absolute right-4 bottom-72 flex flex-col gap-3">
<button class="w-14 h-14 bg-background-dark/90 text-slate-100 rounded-full flex items-center justify-center shadow-xl border border-slate-700/50">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="w-14 h-14 bg-background-dark/90 text-slate-100 rounded-full flex items-center justify-center shadow-xl border border-slate-700/50">
<span class="material-symbols-outlined">navigation</span>
</button>
<button class="group flex items-center gap-2 bg-primary text-white px-4 py-3 rounded-full shadow-2xl hover:bg-primary/90 transition-all">
<span class="material-symbols-outlined">report_problem</span>
<span class="font-bold text-sm">Drop Hazard Pin</span>
</button>
</div>
<!-- Floating Bottom Sheet (Route Safety Card) -->
<div class="absolute bottom-0 left-0 w-full bg-background-dark rounded-t-[2rem] p-6 custom-shadow border-t border-slate-800">
<div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-6"></div>
<div class="flex items-start justify-between mb-6">
<div>
<h2 class="text-xl font-bold text-slate-100">Safe Route Found</h2>
<p class="text-slate-400 text-sm">Via 5th Avenue • 12 min walk</p>
</div>
<div class="bg-safe-green/20 border border-safe-green/30 px-3 py-2 rounded-xl text-center">
<div class="text-xs text-safe-green font-bold uppercase tracking-wider">Danger Score</div>
<div class="text-xl font-black text-safe-green leading-none">12<span class="text-xs font-normal">/100</span></div>
<div class="text-[10px] text-safe-green font-medium">Safe</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-slate-800/50 p-4 rounded-2xl flex items-center gap-3">
<div class="w-10 h-10 bg-safe-green/10 rounded-full flex items-center justify-center text-safe-green">
<span class="material-symbols-outlined">lightbulb</span>
</div>
<div>
<div class="text-slate-100 text-sm font-semibold">Good Lighting</div>
<div class="text-slate-500 text-[10px]">95% coverage</div>
</div>
</div>
<div class="bg-slate-800/50 p-4 rounded-2xl flex items-center gap-3">
<div class="w-10 h-10 bg-caution-amber/10 rounded-full flex items-center justify-center text-caution-amber">
<span class="material-symbols-outlined">release_alert</span>
</div>
<div>
<div class="text-slate-100 text-sm font-semibold">2 Recent Incidents</div>
<div class="text-slate-500 text-[10px]">Last 24 hours</div>
</div>
</div>
</div>
<button class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:shadow-primary/20 transition-all">
                Start Navigation
            </button>
</div>
<!-- Bottom Nav Bar Component Overlay (Fixed Bottom) -->
<div class="fixed bottom-0 left-0 w-full bg-background-dark border-t border-slate-800 px-6 py-3 flex justify-between items-center z-50">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">explore</span>
<span class="text-[10px] font-medium">Explore</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">shield_with_heart</span>
<span class="text-[10px] font-medium">Safety</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">warning</span>
<span class="text-[10px] font-medium">Reports</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</div>
</body></html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Safe Route Navigator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #0f1414;
      --panel: #171d1d;
      --muted: #8ca0a0;
      --text: #eef4f4;
      --accent: #f97316;
      --safe: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Public Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #1f2a2a 0, var(--bg) 40%);
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      padding: 14px;
      border-bottom: 1px solid #243131;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr auto;
      align-items: end;
      background: rgba(14, 18, 18, 0.86);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .field select {
      border: 1px solid #2a3a3a;
      background: #101717;
      color: var(--text);
      border-radius: 10px;
      height: 42px;
      padding: 0 12px;
      outline: none;
    }

    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
    }

    .search-btn {
      height: 42px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #f43f5e);
      cursor: pointer;
      padding: 0 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: calc(100dvh - 79px);
    }

    .panel {
      border-left: 1px solid #243131;
      background: var(--panel);
      padding: 18px;
      overflow: auto;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .info {
      margin-top: 16px;
      border: 1px solid #273636;
      border-radius: 12px;
      padding: 14px;
      background: #111818;
      line-height: 1.6;
      font-size: 14px;
    }

    .legend {
      margin-top: 16px;
      border: 1px solid #273636;
      border-radius: 12px;
      padding: 14px;
      background: #111818;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: middle;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }

      #map {
        height: 62dvh;
      }

      .panel {
        border-left: 0;
        border-top: 1px solid #243131;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="field">
      <label for="startLocation">Start Location</label>
      <select id="startLocation"></select>
    </div>

    <div class="field">
      <label for="endLocation">End Location</label>
      <select id="endLocation"></select>
    </div>

    <button id="routeSearchBtn" class="search-btn">Find Safe Route</button>
  </header>

  <main class="layout">
    <div id="map"></div>

    <aside class="panel">
      <h2>Route Intelligence</h2>
      <p>Dataset-only routing. No external directions APIs used.</p>

      <div id="routeInfo" class="info">
        Select start and end locations, then click <strong>Find Safe Route</strong>.
      </div>

      <div class="legend">
        <div><strong>Route Risk</strong></div>
        <div><span class="dot" style="background:#10b981"></span>LOW</div>
        <div><span class="dot" style="background:#f59e0b"></span>MEDIUM</div>
        <div><span class="dot" style="background:#ef4444"></span>HIGH</div>
        <br />
        <div><strong>Hazard Severity</strong></div>
        <div><span class="dot" style="background:#ef4444"></span>HIGH</div>
        <div><span class="dot" style="background:#f59e0b"></span>MEDIUM</div>
        <div><span class="dot" style="background:#facc15"></span>LOW</div>
      </div>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const safeRouteDataset = {
      "locations": [
        {"name":"GCOEN Khapri","lat":21.0908,"lng":79.0472,"safety":"HIGH"},
        {"name":"Khapri Station","lat":21.0921,"lng":79.0551,"safety":"MEDIUM"},
        {"name":"AIIMS Nagpur","lat":21.0942,"lng":79.0605,"safety":"HIGH"},
        {"name":"MIHAN SEZ","lat":21.0935,"lng":79.0623,"safety":"HIGH"},
        {"name":"Nagpur Airport","lat":21.0920,"lng":79.0472,"safety":"HIGH"},
        {"name":"Wardha Road","lat":21.1001,"lng":79.0450,"safety":"MEDIUM"},
        {"name":"Somalwada","lat":21.0960,"lng":79.0530,"safety":"MEDIUM"},
        {"name":"Narendra Nagar","lat":21.1065,"lng":79.0590,"safety":"HIGH"},
        {"name":"Pratap Nagar","lat":21.1080,"lng":79.0670,"safety":"HIGH"},
        {"name":"Trimurti Nagar","lat":21.1160,"lng":79.0610,"safety":"HIGH"},
        {"name":"Jaiprakash Nagar","lat":21.1010,"lng":79.0670,"safety":"HIGH"},
        {"name":"Futala Lake","lat":21.1370,"lng":79.0720,"safety":"HIGH"},
        {"name":"Sitabuldi","lat":21.1450,"lng":79.0850,"safety":"MEDIUM"}
      ],
      "routes":[
        {"id":1,"start":"GCOEN Khapri","end":"AIIMS Nagpur","distance_km":2.4,"risk_level":"LOW","route":[{"lat":21.0908,"lng":79.0472},{"lat":21.0920,"lng":79.0520},{"lat":21.0930,"lng":79.0560},{"lat":21.0942,"lng":79.0605}]},
        {"id":2,"start":"GCOEN Khapri","end":"Khapri Station","distance_km":1.8,"risk_level":"MEDIUM","route":[{"lat":21.0908,"lng":79.0472},{"lat":21.0912,"lng":79.0500},{"lat":21.0917,"lng":79.0525},{"lat":21.0921,"lng":79.0551}]},
        {"id":3,"start":"AIIMS Nagpur","end":"Somalwada","distance_km":2.8,"risk_level":"MEDIUM","route":[{"lat":21.0942,"lng":79.0605},{"lat":21.0950,"lng":79.0580},{"lat":21.0955,"lng":79.0555},{"lat":21.0960,"lng":79.0530}]},
        {"id":4,"start":"Somalwada","end":"Narendra Nagar","distance_km":2.5,"risk_level":"LOW","route":[{"lat":21.0960,"lng":79.0530},{"lat":21.0990,"lng":79.0555},{"lat":21.1030,"lng":79.0575},{"lat":21.1065,"lng":79.0590}]},
        {"id":5,"start":"Narendra Nagar","end":"Pratap Nagar","distance_km":1.5,"risk_level":"LOW","route":[{"lat":21.1065,"lng":79.0590},{"lat":21.1070,"lng":79.0620},{"lat":21.1075,"lng":79.0645},{"lat":21.1080,"lng":79.0670}]},
        {"id":6,"start":"Pratap Nagar","end":"Trimurti Nagar","distance_km":1.6,"risk_level":"LOW","route":[{"lat":21.1080,"lng":79.0670},{"lat":21.1105,"lng":79.0650},{"lat":21.1130,"lng":79.0630},{"lat":21.1160,"lng":79.0610}]},
        {"id":7,"start":"Trimurti Nagar","end":"Sitabuldi","distance_km":3.5,"risk_level":"MEDIUM","route":[{"lat":21.1160,"lng":79.0610},{"lat":21.1230,"lng":79.0660},{"lat":21.1340,"lng":79.0740},{"lat":21.1450,"lng":79.0850}]}
      ],
      "hazards":[
        {"id":1,"lat":21.0980,"lng":79.0550,"severity":"HIGH","description":"Poor lighting and isolated area"},
        {"id":2,"lat":21.1030,"lng":79.0580,"severity":"MEDIUM","description":"Reported theft incidents"},
        {"id":3,"lat":21.1120,"lng":79.0610,"severity":"HIGH","description":"Unsafe industrial road"},
        {"id":4,"lat":21.1300,"lng":79.0720,"severity":"MEDIUM","description":"Crowded traffic area"}
      ]
    };

    const routeColors = { LOW: "green", MEDIUM: "orange", HIGH: "red" };
    const hazardColors = { HIGH: "red", MEDIUM: "orange", LOW: "yellow" };

    const routeState = {
      data: null,
      routeLayer: null,
      hazardLayer: L.layerGroup(),
      startMarker: null,
      endMarker: null
    };

    let map = window.map;
    if (!map) {
      map = L.map("map").setView([21.1065, 79.0590], 13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);
      window.map = map;
    }

    routeState.hazardLayer.addTo(map);

    const startEl = document.getElementById("startLocation");
    const endEl = document.getElementById("endLocation");
    const searchEl = document.getElementById("routeSearchBtn");
    const infoEl = document.getElementById("routeInfo");

    function loadDataset() {
      routeState.data = safeRouteDataset;

      const options = routeState.data.locations
        .map((loc) => `<option value="${loc.name}">${loc.name}</option>`)
        .join("");

      startEl.innerHTML = `<option value="">Select start location</option>${options}`;
      endEl.innerHTML = `<option value="">Select end location</option>${options}`;

      return routeState.data;
    }

    function findRoute(start, end) {
      if (!routeState.data) return null;
      return routeState.data.routes.find((r) => r.start === start && r.end === end) || null;
    }

    function drawRoute(route) {
      if (routeState.routeLayer) map.removeLayer(routeState.routeLayer);
      if (routeState.startMarker) map.removeLayer(routeState.startMarker);
      if (routeState.endMarker) map.removeLayer(routeState.endMarker);

      if (!route) return;

      const latLngs = route.route.map((p) => [p.lat, p.lng]);
      routeState.routeLayer = L.polyline(latLngs, {
        color: routeColors[route.risk_level] || "gray",
        weight: 6,
        opacity: 0.9
      }).addTo(map);

      routeState.startMarker = L.marker(latLngs[0]).addTo(map).bindPopup(`Start: ${route.start}`);
      routeState.endMarker = L.marker(latLngs[latLngs.length - 1]).addTo(map).bindPopup(`End: ${route.end}`);

      map.fitBounds(routeState.routeLayer.getBounds(), { padding: [24, 24] });
    }

    function haversineDistanceKm(a, b) {
      const toRad = (d) => (d * Math.PI) / 180;
      const R = 6371;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);

      const x =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) * Math.sin(dLng / 2);

      return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }

    function drawHazards(route) {
      routeState.hazardLayer.clearLayers();
      if (!route) return [];

      const nearHazards = routeState.data.hazards.filter((hazard) => {
        return route.route.some((point) => haversineDistanceKm(hazard, point) <= 0.35);
      });

      nearHazards.forEach((hazard) => {
        const color = hazardColors[hazard.severity] || "yellow";
        L.circle([hazard.lat, hazard.lng], {
          radius: 200,
          color,
          fillColor: color,
          fillOpacity: 0.28,
          weight: 2
        })
          .bindPopup(`<strong>${hazard.severity} Hazard</strong><br>${hazard.description}`)
          .addTo(routeState.hazardLayer);
      });

      return nearHazards;
    }

    function displayRouteInfo(route, hazards = []) {
      if (!route) {
        infoEl.innerHTML = "No route available for the selected locations.";
        return;
      }

      const warning = hazards.length > 0
        ? "⚠ Danger zone detected along this route."
        : "✅ No hazard zones detected along this route.";

      infoEl.innerHTML = `
        <div><strong>Start:</strong> ${route.start}</div>
        <div><strong>End:</strong> ${route.end}</div>
        <div><strong>Distance:</strong> ${route.distance_km} km</div>
        <div><strong>Risk Level:</strong> ${route.risk_level}</div>
        <div><strong>Nearby Hazards:</strong> ${hazards.length}</div>
        <div style="margin-top:8px">${warning}</div>
      `;
    }

    function handleRouteSearch() {
      const start = startEl.value;
      const end = endEl.value;

      if (!start || !end) {
        displayRouteInfo(null);
        return;
      }

      const route = findRoute(start, end);

      if (!route) {
        drawRoute(null);
        drawHazards(null);
        displayRouteInfo(null);
        return;
      }

      drawRoute(route);
      const nearHazards = drawHazards(route);
      displayRouteInfo(route, nearHazards);
    }

    loadDataset();
    searchEl.addEventListener("click", handleRouteSearch);
  </script>
</body>
</html>

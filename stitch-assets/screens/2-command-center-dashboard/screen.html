<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#000000",
                        "crimson": "#dc2626",
                        "emerald": "#10b981",
                        "electric-blue": "#3b82f6",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Suraksha AI - Command Center</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="flex items-center bg-background-dark/80 backdrop-blur-md sticky top-0 z-50 p-4 justify-between border-b border-white/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">shield_person</span>
<h1 class="text-slate-100 text-xl font-bold tracking-tight">Suraksha AI</h1>
</div>
<div class="flex gap-2">
<button class="p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">notifications</span>
</button>
<button class="p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">account_circle</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col p-4 gap-6 max-w-md mx-auto w-full">
<!-- Search Bar -->
<div class="w-full">
<label class="flex flex-col w-full h-14">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-white/10 border border-white/5 focus-within:border-primary/50 transition-all">
<div class="text-slate-400 flex items-center justify-center pl-4">
<span class="material-symbols-outlined">directions_run</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 text-slate-100 placeholder:text-slate-500 px-4 text-base font-normal" placeholder="Quick Safe Route" value=""/>
<div class="text-slate-400 flex items-center justify-center pr-4">
<span class="material-symbols-outlined">search</span>
</div>
</div>
</label>
</div>
<!-- Massive SOS Section -->
<div class="flex-1 flex flex-col items-center justify-center py-8">
<div class="relative group">
<!-- Decorative pulse rings -->
<div class="absolute inset-0 rounded-full bg-crimson/20 animate-ping"></div>
<div class="absolute -inset-4 rounded-full border-2 border-crimson/10"></div>
<button class="relative z-10 size-64 rounded-full bg-crimson shadow-[0_0_50px_rgba(220,38,38,0.5)] flex flex-col items-center justify-center border-8 border-background-dark active:scale-95 transition-transform">
<span class="material-symbols-outlined text-7xl text-white mb-2">emergency_home</span>
<span class="text-white text-4xl font-black tracking-widest">SOS</span>
</button>
</div>
<p class="mt-8 text-slate-400 font-medium animate-pulse flex items-center gap-2">
<span class="material-symbols-outlined text-sm">touch_app</span>
                Hold to Activate
            </p>
</div>
<!-- Horizontal Tool Tiles -->
<section>
<h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4 px-1">Quick Actions</h3>
<div class="flex overflow-x-auto gap-4 no-scrollbar pb-2">
<!-- Fake Call -->
<button class="flex-shrink-0 flex flex-col items-center justify-center gap-3 w-28 h-28 rounded-2xl bg-emerald/10 border border-emerald/20 hover:bg-emerald/20 transition-colors">
<span class="material-symbols-outlined text-emerald text-3xl">call</span>
<span class="text-emerald text-xs font-bold">Fake Call</span>
</button>
<!-- Digital Scan -->
<button class="flex-shrink-0 flex flex-col items-center justify-center gap-3 w-28 h-28 rounded-2xl bg-electric-blue/10 border border-electric-blue/20 hover:bg-electric-blue/20 transition-colors">
<span class="material-symbols-outlined text-electric-blue text-3xl">radar</span>
<span class="text-electric-blue text-xs font-bold text-center px-2">Digital Scan</span>
</button>
<!-- Live Location -->
<button class="flex-shrink-0 flex flex-col items-center justify-center gap-3 w-28 h-28 rounded-2xl bg-electric-blue/10 border border-electric-blue/20 hover:bg-electric-blue/20 transition-colors">
<span class="material-symbols-outlined text-electric-blue text-3xl">share_location</span>
<span class="text-electric-blue text-xs font-bold">Live Loc</span>
</button>
<!-- Shield Status -->
<button class="flex-shrink-0 flex flex-col items-center justify-center gap-3 w-28 h-28 rounded-2xl bg-primary/10 border border-primary/20 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl">verified_user</span>
<span class="text-primary text-xs font-bold">Safe Zone</span>
</button>
</div>
</section>
<!-- AI Listener Card -->
<div class="mt-auto mb-4 p-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="relative size-10 flex items-center justify-center">
<div class="absolute inset-0 bg-emerald/30 rounded-full animate-ping"></div>
<div class="relative z-10 size-3 bg-emerald rounded-full"></div>
</div>
<div>
<h4 class="text-slate-100 font-bold text-sm">Edge AI Listener: <span class="text-emerald">ACTIVE</span></h4>
<p class="text-slate-400 text-xs">Listening for: "Bachao" / "Help"</p>
</div>
</div>
<span class="material-symbols-outlined text-slate-500">graphic_eq</span>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-background-dark border-t border-white/10 px-4 pb-6 pt-2">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">grid_view</span>
<p class="text-[10px] font-bold">Dashboard</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300" href="#">
<span class="material-symbols-outlined">map</span>
<p class="text-[10px] font-medium">Safe Map</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300" href="#">
<span class="material-symbols-outlined">history</span>
<p class="text-[10px] font-medium">History</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300" href="#">
<span class="material-symbols-outlined">settings</span>
<p class="text-[10px] font-medium">Settings</p>
</a>
</div>
</nav>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
